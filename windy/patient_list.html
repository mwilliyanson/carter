<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Patient List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
    font-family:Inter,system-ui,sans-serif;
}

.header{
    margin:24px 0;
}

.patient-card{
    border:none;
    border-radius:18px;
    box-shadow:0 5px 18px rgba(0,0,0,.06);
    transition:.2s;
    margin-bottom:18px;
}

.patient-card:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.avatar{
    width:64px;
    height:64px;
    border-radius:50%;
    object-fit:cover;
}

.patient-name{
    font-weight:700;
    font-size:1.1rem;
}

.patient-id{
    color:#6b7280;
    font-size:.9rem;
}

.info{
    color:#4b5563;
    font-size:.92rem;
}

.search-box{
    position:relative;
}

.search-box i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#9ca3af;
}

.search-box input{
    padding-left:42px;
    height:48px;
    border-radius:12px;
}

.badge-status{
    border-radius:30px;
    padding:7px 14px;
}

@media(max-width:768px){

.action-buttons{
    margin-top:18px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.fab{
    position:fixed;
    right:20px;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    font-size:28px;
    box-shadow:0 10px 25px rgba(37,99,235,.35);
}

}

@media(min-width:769px){
.fab{
    display:none;
}
}

</style>
</head>
