<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Laporan Operasi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
    font-family:Inter,system-ui,sans-serif;
}

.page-title{
    font-weight:700;
}

.card{
    border:none;
    border-radius:18px;
    box-shadow:0 5px 18px rgba(0,0,0,.06);
    margin-bottom:22px;
}

.section-title{
    font-weight:700;
    color:#2563eb;
    margin-bottom:20px;
}

.form-control,
.form-select{
    border-radius:12px;
    min-height:48px;
}

textarea{
    min-height:120px;
    resize:vertical;
}

.timeline-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

@media(max-width:768px){

.timeline-grid{
    grid-template-columns:1fr;
}

.sticky-save{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#fff;
    padding:14px;
    box-shadow:0 -5px 20px rgba(0,0,0,.12);
    z-index:1000;
}

body{
    padding-bottom:90px;
}

}

</style>
</head>

<body>

<div class="container py-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<div>

<h2 class="page-title">
<i class="bi bi-heart-pulse-fill text-danger"></i>
Laporan Operasi
</h2>

<div class="text-secondary">
View / Edit Laporan Operasi
</div>

</div>

<div class="d-none d-md-block">
<button class="btn btn-outline-secondary">Cancel</button>
<button class="btn btn-primary">Save</button>
</div>

</div>

<!-- INFORMASI -->

<div class="card">

<div class="card-body">

<div class="section-title">
Informasi Operasi
</div>

<div class="row">

<div class="col-md-4 mb-3">
<label>Tanggal Operasi</label>
<input type="date" class="form-control" value="2026-07-13">
</div>

<div class="col-md-4 mb-3">
<label>Unit</label>
<input class="form-control" value="Kencana Executive">
</div>

<div class="col-md-4 mb-3">
<label>Doctor In Charge</label>
<input class="form-control" value="dr. Jonathan Wijaya, Sp.B">
</div>

<div class="col-md-4 mb-3">
<label>Ruang OP</label>
<input class="form-control" value="Kencana-OK4">
</div>

<div class="col-md-4 mb-3">
<label>Status</label>

<select class="form-select">
<option selected>Selesai</option>
<option>Berlangsung</option>
<option>Dibatalkan</option>
</select>

</div>

</div>

</div>

</div>

<!-- TIMELINE -->

<div class="card">

<div class="card-body">

<div class="section-title">
Timeline Operasi
</div>

<div class="timeline-grid">

<div>
<label>Jadwal Mulai</label>
<input type="time" class="form-control" value="08:00">
</div>

<div>
<label>Jadwal Selesai</label>
<input type="time" class="form-control" value="11:05">
</div>

<div>
<label>Lama Pembedahan</label>
<input class="form-control" value="1 Jam 47 Menit">
</div>

</div>

</div>

</div>

<!-- DIAGNOSIS -->

<div class="card">

<div class="card-body">

<div class="section-title">
Diagnosis
</div>

<div class="mb-3">

<label>Diagnosis Pra Bedah (ICD)</label>

<input class="form-control"
value="K35.80 - Acute Appendicitis">

</div>

<div class="mb-3">

<label>Diagnosis Pra Bedah (Naratif)</label>

<textarea class="form-control">Pasien datang dengan nyeri perut kanan bawah sejak 24 jam disertai mual dan muntah.</textarea>

</div>

<div class="mb-3">

<label>Diagnosis Pasca Bedah</label>

<textarea class="form-control">Acute appendicitis tanpa perforasi berhasil dilakukan appendectomy.</textarea>

</div>

</div>

</div>

<!-- SURGERY REPORT -->

<div class="card">

<div class="card-body">

<div class="section-title">
Laporan Pembedahan
</div>

<div class="mb-3">

<label>Uraian Pembedahan</label>

<textarea class="form-control">
Pasien dilakukan appendectomy secara laparoskopi.
Prosedur berlangsung lancar tanpa hambatan.
</textarea>

</div>

<div class="mb-3">

<label>Komplikasi Selama Pembedahan (Bila Ada)</label>

<textarea class="form-control">
Tidak ada komplikasi intraoperatif.
</textarea>

</div>

<div>

<label>Konsultasi Intra Operatif</label>

<textarea class="form-control">
Tidak diperlukan konsultasi tambahan selama tindakan operasi.
</textarea>

</div>

</div>

</div>

<div class="sticky-save d-md-none">

<div class="d-grid gap-2">

<button class="btn btn-primary btn-lg">
<i class="bi bi-floppy"></i>
Save Changes
</button>

</div>

</div>

</div>

</body>
</html>
