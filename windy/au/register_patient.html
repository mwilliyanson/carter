<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Daftar Akun</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f4f8fc;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.register-card{
    width:100%;
    max-width:450px;
    background:#fff;
    border:none;
    border-radius:24px;
    box-shadow:0 12px 35px rgba(0,0,0,.08);
    padding:35px;
}

.logo-circle{
    width:90px;
    height:90px;
    background:#EAF4FF;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0 auto 25px;
}

.logo-circle i{
    font-size:42px;
    color:#0d6efd;
}

h2{
    text-align:center;
    font-weight:700;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#6c757d;
    margin-bottom:30px;
}

.form-control{
    height:52px;
    border-radius:12px;
}

.input-group-text{
    cursor:pointer;
}

.btn-register{
    height:52px;
    border-radius:12px;
    font-weight:600;
}

.login-text{
    text-align:center;
    margin-top:25px;
    color:#6c757d;
}

.login-text a{
    text-decoration:none;
    font-weight:600;
}

.form-check{
    margin:20px 0;
}

.form-check-label{
    font-size:14px;
}
</style>

</head>
<body>

<div class="register-card">

    <div class="logo-circle">
        <i class="bi bi-person-plus-fill"></i>
    </div>

    <h2>Buat Akun</h2>

    <p class="subtitle">
        Silahkan lengkapi data di bawah ini
    </p>

    <form action="../patient_main_page_client.html">

        <div class="mb-3">
            <label class="form-label">Nama Lengkap</label>
            <input type="text"
                   class="form-control"
                   placeholder="Masukkan Nama Lengkap"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email"
                   class="form-control"
                   placeholder="Masukkan Email"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Kata Sandi</label>

            <div class="input-group">

                <input type="password"
                       class="form-control"
                       id="password"
                       placeholder="Masukkan Kata Sandi"
                       required>

                <span class="input-group-text" onclick="togglePassword('password','eye1')">
                    <i id="eye1" class="bi bi-eye"></i>
                </span>

            </div>

        </div>

        <div class="mb-3">
            <label class="form-label">Konfirmasi Kata Sandi</label>

            <div class="input-group">

                <input type="password"
                       class="form-control"
                       id="confirmPassword"
                       placeholder="Masukkan Ulang Kata Sandi"
                       required>

                <span class="input-group-text" onclick="togglePassword('confirmPassword','eye2')">
                    <i id="eye2" class="bi bi-eye"></i>
                </span>

            </div>

        </div>

        <div class="form-check">

            <input class="form-check-input"
                   type="checkbox"
                   id="agree"
                   required>

            <label class="form-check-label" for="agree">
                Saya setuju dengan
                <a href="#">Ketentuan Layanan</a>
                dan
                <a href="#">Kebijakan Privasi</a>.
            </label>

        </div>

        <div class="d-grid">

            <button class="btn btn-primary btn-register">
                Daftar
            </button>

        </div>

    </form>

    <div class="login-text">

        Sudah memiliki akun?
        <a href="https://www.yahoo.com">
            Masuk
        </a>

    </div>

</div>

<script>

function togglePassword(id, eyeId){

    const input = document.getElementById(id);
    const eye = document.getElementById(eyeId);

    if(input.type === "password"){
        input.type = "text";
        eye.className = "bi bi-eye-slash";
    }else{
        input.type = "password";
        eye.className = "bi bi-eye";
    }

}

</script>

</body>
</html>
