<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patient Medical Record</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        background:#f5f7fb;
    }

    .card{
        border:none;
        border-radius:12px;
        box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    .section-title{
        font-size:1.05rem;
        font-weight:600;
        color:#0d6efd;
        margin-bottom:20px;
    }

    textarea{
        min-height:110px;
    }

    .patient-photo{
        width:220px;
        height:220px;
        object-fit:cover;
        border-radius:10px;
        border:1px solid #dee2e6;
    }

    .readonly{
        background:#f8f9fa;
    }
</style>
</head>

<body>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1">Riwayat Pemeriksaan</h2>
            <small class="text-muted">
                View / Edit Medical Record
            </small>
        </div>

        <div>
            <button class="btn btn-outline-secondary me-2">Cancel</button>
            <button class="btn btn-primary">Save Changes</button>
        </div>
    </div>

    <form>

        <!-- Medical Record -->
        <div class="card mb-4">
            <div class="card-body">

                <div class="section-title">
                    Data Pemeriksaan
                </div>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Tanggal Riwayat</label>
                        <input
                            type="date"
                            class="form-control"
                            value="2026-07-10">
                    </div>

                     <div class="col-md-4 mb-3">
                        <label class="form-label">Jadwal Kontrol Berikutnya</label>
                        <input
                            type="date"
                            class="form-control"
                            value="2026-07-24">
                    </div>

                </div>

                <div class="mb-3">
                    <label class="form-label">Keluhan</label>
                    <textarea class="form-control">Pasien mengeluh batuk kering selama 2 minggu disertai tenggorokan gatal.</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Subyektif</label>
                    <textarea class="form-control">Pasien mengatakan batuk lebih sering terjadi pada malam hari dan tidak disertai sesak napas.</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Obyektif</label>
                    <textarea class="form-control">Kesadaran baik. TD 118/76 mmHg. Nadi 82 x/menit. Suhu 36.8°C. Saturasi 99%.</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Assessment</label>
                    <textarea class="form-control">Suspek infeksi saluran napas atas (ISPA) ringan tanpa komplikasi.</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Plan</label>
                    <textarea class="form-control">Observasi, terapi simptomatik, anjurkan banyak minum, kontrol apabila keluhan memburuk.</textarea>
                </div>

            </div>
        </div>

        <!-- Photo -->
        <div class="card mb-4">
            <div class="card-body">

                <div class="section-title">
                    Lainnya (Foto Pasien)
                </div>

                <div class="row align-items-center">

                    <div class="col-md-3 text-center mb-3">

                        <img
                            src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=500"
                            class="patient-photo"
                            alt="Patient">

                    </div>

                    <div class="col-md-9">

                        <label class="form-label">Upload Foto Baru</label>

                        <input
                            type="file"
                            class="form-control">

                        <div class="form-text">
                            JPG, PNG (Maximum 5 MB)
                        </div>

                    </div>

                </div>

            </div>
        </div>

        <!-- Doctor -->
        <div class="card">

            <div class="card-body">

                <div class="section-title">
                    Dokter yang Menangani
                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nama Dokter</label>
                        <input
                            type="text"
                            class="form-control"
                            value="dr. Jonathan Wijaya, Sp.PD">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Spesialis</label>
                        <input
                            type="text"
                            class="form-control"
                            value="Spesialis Penyakit Dalam">
                    </div>

                </div>

            </div>

        </div>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
