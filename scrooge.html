<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reimbursement Camera</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-gray-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6">

  <h1 class="text-xl font-bold text-gray-800">Reimbursement</h1>
  <p class="text-sm text-gray-500 mb-6">Snap your receipt & submit instantly</p>

  <form id="form" class="space-y-4">

    <!-- Description -->
    <textarea id="description" placeholder="What is this expense for?"
      class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" required></textarea>

    <!-- Nominal -->
    <input id="nominal" type="number" placeholder="Nominal (IDR)"
      class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" required />

    <!-- CAMERA AREA -->
    <div class="border rounded-lg p-3 bg-gray-50 space-y-3">

      <label class="text-sm text-gray-600">Receipt Camera</label>

      <!-- Live camera -->
      <video id="video" autoplay playsinline class="w-full rounded-lg bg-black"></video>

      <button type="button" id="captureBtn"
        class="w-full bg-gray-800 text-white py-2 rounded-lg hover:bg-gray-900">
        📸 Capture Photo
      </button>

      <!-- Preview -->
      <canvas id="canvas" class="hidden"></canvas>
      <img id="preview" class="hidden mt-2 rounded-lg w-full" />

    </div>

    <!-- Submit -->
    <button type="submit"
      class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition">
      Submit Reimbursement
    </button>

    <p id="status" class="text-center text-sm text-gray-500"></p>

  </form>
</div>

<script>
const AIRTABLE_TOKEN = "YOUR_TOKEN_HERE";
const BASE_ID = "appkVzAIFtGDeD9Bj";
const TABLE_NAME = "Table%201";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const preview = document.getElementById("preview");
const statusEl = document.getElementById("status");

let capturedBlob = null;

// 1. Start camera automatically
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" },
      audio: false
    });
    video.srcObject = stream;
  } catch (err) {
    statusEl.innerText = "❌ Camera access denied";
    console.error(err);
  }
}

startCamera();

// 2. Capture image from video
document.getElementById("captureBtn").addEventListener("click", () => {
  const context = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  context.drawImage(video, 0, 0, canvas.width, canvas.height);

  canvas.toBlob((blob) => {
    capturedBlob = blob;

    const url = URL.createObjectURL(blob);
    preview.src = url;

    preview.classList.remove("hidden");
  }, "image/jpeg", 0.9);
});

// 3. Submit form
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  statusEl.innerText = "Creating record...";

  const description = document.getElementById("description").value;
  const nominal = Number(document.getElementById("nominal").value);

  try {
    // 1. Create record first
    const createRes = await fetch(
      `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`,
      {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          fields: {
            description,
            nominal,
            status: "Pending"
          }
        })
      }
    );

    const createData = await createRes.json();

    if (!createRes.ok) {
      throw new Error(JSON.stringify(createData));
    }

    const recordId = createData.id;

    // 2. Upload image if exists
    if (capturedBlob) {
      statusEl.innerText = "Uploading image...";

      const base64 = await blobToBase64(capturedBlob);

      const uploadRes = await fetch(
        `https://content.airtable.com/v0/${BASE_ID}/${recordId}/attachments/uploadAttachment`,
        {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            contentType: "image/jpeg",
            filename: "receipt.jpg",
            file: base64.split(",")[1]
          })
        }
      );

      const uploadData = await uploadRes.json();

      if (!uploadRes.ok) {
        throw new Error(JSON.stringify(uploadData));
      }

      // 3. Attach to record
      await fetch(
        `https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}/${recordId}`,
        {
          method: "PATCH",
          headers: {
            "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            fields: {
              attachments: [
                {
                  url: uploadData.url,
                  filename: "receipt.jpg"
                }
              ]
            }
          })
        }
      );
    }

    statusEl.innerText = "✅ Submitted successfully!";
    document.getElementById("form").reset();
    preview.classList.add("hidden");
    capturedBlob = null;

  } catch (err) {
    console.error(err);
    statusEl.innerText = "❌ Failed: " + err.message;
  }
});

// helper
function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
</script>

</body>
</html>
